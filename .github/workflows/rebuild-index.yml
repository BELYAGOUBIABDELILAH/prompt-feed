name: Rebuild Prompt Index

on:
  push:
    branches:
      - main
    paths:
      - 'data/prompts.json'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate prompts tree
        run: node scripts/generate-tree.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts/ README.md
          git diff --cached --quiet || git commit -m "chore: rebuild prompts tree from data/prompts.json [skip ci]"
          git push
